<svg viewBox="0 0 760 320" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0.5 L7.5,4 L0,7.5" fill="none" stroke="#b9b9c2" stroke-width="1.2"/>
    </marker>
  </defs>
  <style>
    .t  { font-size: 13px; font-weight: 600; fill: #0d0c2b; }
    .c  { font-size: 11px; fill: #666; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .l  { font-size: 11px; fill: #ff4301; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: 0.05em; }
    .box  { fill: #fff; stroke: #cfcfd6; rx: 6; }
    .boxa { fill: #fff; stroke: #ff4301; stroke-width: 1.2; rx: 6; }
    .boxk { fill: #fff; stroke: #0d0c2b; stroke-width: 1.2; rx: 6; }
    .ln { stroke: #b9b9c2; stroke-width: 1.2; fill: none; }
  </style>

  <!-- input -->
  <rect class="box" x="16" y="112" width="150" height="96"/>
  <text class="t" x="32" y="140">Your plan</text>
  <text class="c" x="32" y="162">a prompt, notes,</text>
  <text class="c" x="32" y="178">or a jargon brief</text>
  <text class="c" x="32" y="194">in any language</text>

  <line class="ln" x1="166" y1="160" x2="196" y2="160" marker-end="url(#ar)"/>

  <!-- skill -->
  <rect class="boxa" x="200" y="16" width="368" height="288"/>
  <text class="l" x="220" y="42">BUILD-PLAN SKILL</text>

  <rect class="box" x="220" y="56" width="156" height="72"/>
  <text class="t" x="232" y="78">Writing rules</text>
  <text class="c" x="232" y="96">plain words</text>
  <text class="c" x="232" y="112">takeaway headlines</text>

  <rect class="box" x="392" y="56" width="156" height="72"/>
  <text class="t" x="404" y="78">Diagram rules</text>
  <text class="c" x="404" y="96">SVG figures with</text>
  <text class="c" x="404" y="112">numbered notes</text>

  <rect class="box" x="220" y="144" width="156" height="72"/>
  <text class="t" x="232" y="166">Page framework</text>
  <text class="c" x="232" y="184">sidebar · tables</text>
  <text class="c" x="232" y="200">callouts · mobile</text>

  <rect class="box" x="392" y="144" width="156" height="72"/>
  <text class="t" x="404" y="166">Preferences</text>
  <text class="c" x="404" y="184">logo · language</text>
  <text class="c" x="404" y="200">remembered</text>

  <rect class="box" x="220" y="232" width="328" height="52"/>
  <text class="t" x="232" y="254">Validator</text>
  <text class="c" x="232" y="272">i18n parity · nav order · no placeholders</text>

  <line class="ln" x1="568" y1="160" x2="598" y2="160" marker-end="url(#ar)"/>

  <!-- output -->
  <rect class="boxk" x="602" y="96" width="142" height="128"/>
  <text class="t" x="618" y="124">index.html</text>
  <text class="c" x="618" y="146">self-contained</text>
  <text class="c" x="618" y="162">one language, or a</text>
  <text class="c" x="618" y="178">toggle for several</text>
  <text class="c" x="618" y="200">ready for review</text>
</svg>
